services:
  web:
    build: .
    command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py load_data && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: recommai
      POSTGRES_USER: recommai
      POSTGRES_PASSWORD: recommai
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
