{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RecommAI{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{% url 'home' %}"><span>R</span> RecommAI</a>
    <nav>
      {% if user.is_authenticated %}
        <a href="{% url 'movies' %}">Movies</a>
        <a href="{% url 'music' %}">Music</a>
        <a href="{% url 'jobs' %}">Jobs</a>
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <form method="post" action="{% url 'logout' %}">{% csrf_token %}<button>Logout</button></form>
      {% else %}
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'signup' %}">Sign Up</a>
      {% endif %}
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
